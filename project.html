<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dettaglio progetto - Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="preload" href="https://fonts.gstatic.com/s/titilliumweb/v17/NaPecZTIAOhVxoMyOr9n_E7fRMTmgW1b.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-wrap">
    <header class="header">
      <a href="index.html" class="portfolio-title">Portfolio - Francesco Diella</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="me.html">Me</a>
      </nav>
    </header>

    <article>
      <div class="article-left">
        <h2 id="project-title">Caricamento...</h2>
        <p id="project-meta" class="small-meta"></p>
        <p id="project-description" class="project-description"></p>
      </div>

      <div class="article-right">
        <div class="project-gallery" id="project-gallery"></div>
      </div>
    </article>

    <!-- Project Navigation -->
    <div class="project-navigation">
      <a href="#" id="prev-project" class="nav-arrow prev-arrow" aria-label="Progetto precedente">
        <span class="arrow-symbol">❮</span>
        <span class="arrow-text">Precedente</span>
      </a>
      <a href="#" id="next-project" class="nav-arrow next-arrow" aria-label="Progetto successivo">
        <span class="arrow-text">Successivo</span>
        <span class="arrow-symbol">❯</span>
      </a>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
      <div class="lightbox-container">
        <button class="lightbox-prev">❮</button>
        <div class="lightbox-media">
          <img id="lightbox-img" src="" alt="" />
        </div>
        <button class="lightbox-next">❯</button>
        <div class="lightbox-navigation">
          <div class="lightbox-counter"><span id="current-img">1</span> / <span id="total-img">1</span></div>
          <div class="lightbox-arrows-mobile">
            <button class="lightbox-prev mobile-nav">❮</button>
            <button class="lightbox-next mobile-nav">❯</button>
          </div>
        </div>
      </div>
      <button class="lightbox-close">✕</button>
    </div>

    <footer>
      <a href="index.html">« Torna alla home</a>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
